<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="经典2048数字合并游戏 - 通过方向键或触摸滑动移动方块，相同数字合并得分，目标是将数字合成2048">
    <title>2048 - 经典数字合并游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
            background-color: #faf8ef;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #776e65;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .title {
            font-size: 80px;
            font-weight: bold;
            color: #776e65;
        }

        .scores-container {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background-color: #bbada0;
            padding: 10px 20px;
            border-radius: 6px;
            text-align: center;
            min-width: 100px;
            position: relative;
        }

        .score-label {
            font-size: 13px;
            font-weight: bold;
            color: #eee4da;
            text-transform: uppercase;
        }

        .score-value {
            font-size: 25px;
            font-weight: bold;
            color: #ffffff;
        }

        .score-addition {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            font-weight: bold;
            color: #776e65;
            opacity: 0;
            pointer-events: none;
        }

        .score-addition.animate {
            animation: scorePopup 0.6s ease-out;
        }

        @keyframes scorePopup {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -150%);
            }
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            background-color: #8f7a66;
            color: #f9f6f2;
            border: none;
            padding: 12px 24px;
            border-radius: 3px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            touch-action: manipulation;
        }

        .btn:hover {
            background-color: #9f8b77;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .subtitle {
            margin-bottom: 20px;
            font-size: 18px;
            color: #776e65;
            line-height: 1.5;
        }

        .game-container {
            background-color: #bbada0;
            border-radius: 6px;
            padding: 15px;
            position: relative;
            touch-action: none;
        }

        .grid-background {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .grid-cell {
            aspect-ratio: 1;
            background-color: #cdc1b4;
            border-radius: 6px;
        }

        .grid-container {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .tile {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border-radius: 6px;
            transition: top 0.15s ease-in-out, left 0.15s ease-in-out;
            z-index: 10;
        }

        .tile.new {
            animation: tileAppear 0.2s ease-out;
        }

        .tile.merged {
            animation: tileMerge 0.2s ease-out;
            z-index: 20;
        }

        @keyframes tileAppear {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes tileMerge {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .tile-2 { background-color: #eee4da; color: #776e65; }
        .tile-4 { background-color: #ede0c8; color: #776e65; }
        .tile-8 { background-color: #f2b179; color: #f9f6f2; }
        .tile-16 { background-color: #f59563; color: #f9f6f2; }
        .tile-32 { background-color: #f67c5f; color: #f9f6f2; }
        .tile-64 { background-color: #f65e3b; color: #f9f6f2; }
        .tile-128 { background-color: #edcf72; color: #f9f6f2; }
        .tile-256 { background-color: #edcc61; color: #f9f6f2; }
        .tile-512 { background-color: #edc850; color: #f9f6f2; }
        .tile-1024 { background-color: #edc53f; color: #f9f6f2; }
        .tile-2048 { background-color: #edc22e; color: #f9f6f2; }
        .tile-super { background-color: #3c3a32; color: #f9f6f2; }

        .game-message {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(238, 228, 218, 0.73);
            border-radius: 6px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: fadeIn 0.3s ease-out;
        }

        .game-message.active {
            display: flex;
        }

        .game-message.win {
            background-color: rgba(237, 194, 46, 0.5);
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        .game-message-title {
            font-size: 48px;
            font-weight: bold;
            color: #776e65;
            margin-bottom: 20px;
        }

        .game-message.win .game-message-title {
            color: #f9f6f2;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .game-message-subtitle {
            font-size: 18px;
            color: #776e65;
            margin-bottom: 30px;
        }

        .instructions {
            margin-top: 20px;
            font-size: 14px;
            color: #776e65;
            text-align: center;
            line-height: 1.8;
        }

        .instructions strong {
            color: #776e65;
        }

        @media (max-width: 520px) {
            .title {
                font-size: 48px;
            }

            .score-box {
                padding: 8px 15px;
                min-width: 80px;
            }

            .score-value {
                font-size: 20px;
            }

            .game-container {
                padding: 10px;
            }

            .grid-background {
                gap: 10px;
            }

            .grid-container {
                top: 10px;
                left: 10px;
                right: 10px;
                bottom: 10px;
                gap: 10px;
            }

            .subtitle {
                font-size: 16px;
            }

            .game-message-title {
                font-size: 36px;
            }
        }

        @media (max-width: 380px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .title {
                text-align: center;
                font-size: 40px;
            }

            .scores-container {
                justify-content: center;
            }

            .controls {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">2048</h1>
            <div class="scores-container">
                <div class="score-box">
                    <div class="score-label">分数</div>
                    <div class="score-value" id="score">0</div>
                    <div class="score-addition" id="score-addition"></div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高分</div>
                    <div class="score-value" id="best-score">0</div>
                </div>
            </div>
            <div class="controls">
                <button class="btn" id="new-game-btn">新游戏</button>
            </div>
        </div>

        <p class="subtitle">合并相同数字，挑战2048！使用方向键或滑动来移动方块。</p>

        <div class="game-container" id="game-container">
            <div class="grid-background">
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
            </div>
            <div class="grid-container" id="grid-container"></div>
            <div class="game-message" id="game-message">
                <div class="game-message-title" id="message-title">游戏结束</div>
                <div class="game-message-subtitle" id="message-subtitle">最终得分: 0</div>
                <button class="btn" id="retry-btn">再玩一次</button>
            </div>
        </div>

        <div class="instructions">
            <strong>玩法说明：</strong><br>
            使用 <strong>方向键</strong> 或 <strong>WASD</strong> 键移动方块<br>
            在移动设备上，可以 <strong>滑动屏幕</strong> 来移动方块<br>
            相同数字的方块相撞时会合并成更大的数字<br>
            目标：合成 <strong>2048</strong>！
        </div>
    </div>

    <script>
        class Game2048 {
            constructor() {
                this.gridSize = 4;
                this.grid = [];
                this.score = 0;
                this.bestScore = 0;
                this.gameState = 'playing';
                this.hasWon = false;
                this.tileId = 0;
                this.tiles = new Map();

                this.gridContainer = document.getElementById('grid-container');
                this.scoreElement = document.getElementById('score');
                this.bestScoreElement = document.getElementById('best-score');
                this.scoreAdditionElement = document.getElementById('score-addition');
                this.gameMessageElement = document.getElementById('game-message');
                this.messageTitleElement = document.getElementById('message-title');
                this.messageSubtitleElement = document.getElementById('message-subtitle');

                this.cellSize = 0;
                this.gapSize = 0;

                this.loadBestScore();
                this.setupEventListeners();
                this.calculateCellSize();
                this.init();
            }

            calculateCellSize() {
                const containerWidth = this.gridContainer.offsetWidth;
                const isMobile = window.innerWidth <= 520;
                this.gapSize = isMobile ? 10 : 15;
                this.cellSize = (containerWidth - this.gapSize * 3) / 4;
            }

            loadBestScore() {
                const saved = localStorage.getItem('2048_bestScore');
                this.bestScore = saved ? parseInt(saved, 10) : 0;
                this.bestScoreElement.textContent = this.bestScore;
            }

            saveBestScore() {
                localStorage.setItem('2048_bestScore', this.bestScore.toString());
            }

            init() {
                this.grid = Array(this.gridSize).fill(null).map(() => Array(this.gridSize).fill(0));
                this.score = 0;
                this.gameState = 'playing';
                this.hasWon = false;
                this.tiles.clear();
                this.gridContainer.innerHTML = '';
                this.updateScore(0);
                this.hideMessage();
                this.addRandomTile();
                this.addRandomTile();
            }

            addRandomTile() {
                const emptyCells = [];
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        if (this.grid[r][c] === 0) {
                            emptyCells.push({ r, c });
                        }
                    }
                }

                if (emptyCells.length === 0) return null;

                const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                const value = Math.random() < 0.9 ? 2 : 4;
                this.grid[r][c] = value;

                const tile = this.createTileElement(r, c, value, true);
                return tile;
            }

            createTileElement(row, col, value, isNew = false) {
                const tile = document.createElement('div');
                const tileClass = value <= 2048 ? `tile-${value}` : 'tile-super';
                tile.className = `tile ${tileClass}${isNew ? ' new' : ''}`;
                tile.textContent = value;

                this.setTilePosition(tile, row, col);
                this.updateTileFontSize(tile, value);

                tile.dataset.id = ++this.tileId;
                this.tiles.set(tile.dataset.id, { element: tile, row, col, value });

                this.gridContainer.appendChild(tile);
                return tile;
            }

            setTilePosition(tile, row, col) {
                tile.style.width = `${this.cellSize}px`;
                tile.style.height = `${this.cellSize}px`;
                tile.style.top = `${row * (this.cellSize + this.gapSize)}px`;
                tile.style.left = `${col * (this.cellSize + this.gapSize)}px`;
            }

            updateTileFontSize(tile, value) {
                let fontSize;
                if (value < 100) {
                    fontSize = this.cellSize * 0.5;
                } else if (value < 1000) {
                    fontSize = this.cellSize * 0.4;
                } else if (value < 10000) {
                    fontSize = this.cellSize * 0.3;
                } else {
                    fontSize = this.cellSize * 0.25;
                }
                tile.style.fontSize = `${fontSize}px`;
            }

            updateScore(addedScore) {
                this.score += addedScore;
                this.scoreElement.textContent = this.score;

                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    this.bestScoreElement.textContent = this.bestScore;
                    this.saveBestScore();
                }

                if (addedScore > 0) {
                    this.showScoreAddition(addedScore);
                }
            }

            showScoreAddition(score) {
                this.scoreAdditionElement.textContent = `+${score}`;
                this.scoreAdditionElement.classList.remove('animate');
                void this.scoreAdditionElement.offsetWidth;
                this.scoreAdditionElement.classList.add('animate');
            }

            move(direction) {
                if (this.gameState === 'over') return false;

                const vectors = {
                    up: { r: -1, c: 0 },
                    down: { r: 1, c: 0 },
                    left: { r: 0, c: -1 },
                    right: { r: 0, c: 1 }
                };

                const vector = vectors[direction];
                if (!vector) return false;

                let moved = false;
                const mergedPositions = new Set();
                const tileUpdates = [];

                const traverseOrders = this.getTraverseOrders(direction);

                for (const { r, c } of traverseOrders) {
                    if (this.grid[r][c] === 0) continue;

                    const tileId = this.findTileIdAt(r, c);
                    if (tileId === null) continue;

                    const tileData = this.tiles.get(tileId);
                    let newR = r;
                    let newC = c;
                    let merged = false;

                    while (true) {
                        const nextR = newR + vector.r;
                        const nextC = newC + vector.c;

                        if (nextR < 0 || nextR >= this.gridSize || nextC < 0 || nextC >= this.gridSize) {
                            break;
                        }

                        if (this.grid[nextR][nextC] === 0) {
                            newR = nextR;
                            newC = nextC;
                        } else if (
                            this.grid[nextR][nextC] === this.grid[r][c] &&
                            !mergedPositions.has(`${nextR},${nextC}`)
                        ) {
                            newR = nextR;
                            newC = nextC;
                            merged = true;
                            break;
                        } else {
                            break;
                        }
                    }

                    if (newR !== r || newC !== c) {
                        moved = true;
                        const oldValue = this.grid[r][c];
                        const newValue = merged ? oldValue * 2 : oldValue;

                        this.grid[r][c] = 0;
                        this.grid[newR][newC] = newValue;

                        tileUpdates.push({
                            tileId,
                            fromRow: r,
                            fromCol: c,
                            toRow: newR,
                            toCol: newC,
                            merged,
                            oldValue,
                            newValue
                        });

                        if (merged) {
                            mergedPositions.add(`${newR},${newC}`);
                        }
                    }
                }

                if (moved) {
                    this.processTileUpdates(tileUpdates);
                    return true;
                }

                return false;
            }

            findTileIdAt(row, col) {
                for (const [id, data] of this.tiles) {
                    if (data.row === row && data.col === col) {
                        return id;
                    }
                }
                return null;
            }

            getTraverseOrders(direction) {
                const orders = [];
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        orders.push({ r, c });
                    }
                }

                if (direction === 'down') {
                    orders.reverse();
                } else if (direction === 'right') {
                    for (let i = 0; i < orders.length; i++) {
                        const r = Math.floor(i / this.gridSize);
                        const c = this.gridSize - 1 - (i % this.gridSize);
                        orders[i] = { r, c };
                    }
                } else if (direction === 'left') {
                    for (let i = 0; i < orders.length; i++) {
                        const r = Math.floor(i / this.gridSize);
                        const c = i % this.gridSize;
                        orders[i] = { r, c };
                    }
                }

                return orders;
            }

            processTileUpdates(updates) {
                const tilesToRemove = [];

                for (const update of updates) {
                    const tileData = this.tiles.get(update.tileId);
                    if (!tileData) continue;

                    if (update.merged) {
                        tilesToRemove.push(update.tileId);
                        const mergedTileId = ++this.tileId;
                        const mergedTile = this.createTileElement(update.toRow, update.toCol, update.newValue, false);
                        mergedTile.classList.add('merged');
                        mergedTile.dataset.id = mergedTileId;
                        this.tiles.set(mergedTileId, {
                            element: mergedTile,
                            row: update.toRow,
                            col: update.toCol,
                            value: update.newValue
                        });
                        this.updateScore(update.newValue);

                        if (update.newValue === 2048 && !this.hasWon) {
                            this.hasWon = true;
                            setTimeout(() => this.showWinMessage(), 300);
                        }
                    } else {
                        this.setTilePosition(tileData.element, update.toRow, update.toCol);
                        tileData.row = update.toRow;
                        tileData.col = update.toCol;
                    }
                }

                for (const id of tilesToRemove) {
                    const tileData = this.tiles.get(id);
                    if (tileData && tileData.element.parentNode) {
                        tileData.element.parentNode.removeChild(tileData.element);
                    }
                    this.tiles.delete(id);
                }

                setTimeout(() => {
                    this.addRandomTile();
                    if (this.checkGameOver()) {
                        this.gameState = 'over';
                        setTimeout(() => this.showGameOverMessage(), 300);
                    }
                }, 150);
            }

            checkGameOver() {
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        if (this.grid[r][c] === 0) return false;
                    }
                }

                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        const value = this.grid[r][c];
                        if (r < this.gridSize - 1 && this.grid[r + 1][c] === value) return false;
                        if (c < this.gridSize - 1 && this.grid[r][c + 1] === value) return false;
                    }
                }

                return true;
            }

            showWinMessage() {
                this.messageTitleElement.textContent = '你赢了！';
                this.messageSubtitleElement.textContent = '太棒了！继续挑战更高的分数？';
                this.gameMessageElement.classList.add('active', 'win');
            }

            showGameOverMessage() {
                this.messageTitleElement.textContent = '游戏结束';
                this.messageSubtitleElement.textContent = `最终得分: ${this.score}`;
                this.gameMessageElement.classList.add('active');
                this.gameMessageElement.classList.remove('win');
            }

            hideMessage() {
                this.gameMessageElement.classList.remove('active', 'win');
            }

            setupEventListeners() {
                document.addEventListener('keydown', (e) => this.handleKeyDown(e));

                document.getElementById('new-game-btn').addEventListener('click', () => this.init());
                document.getElementById('retry-btn').addEventListener('click', () => this.init());

                let touchStartX = 0;
                let touchStartY = 0;
                let touchEndX = 0;
                let touchEndY = 0;

                const gameContainer = document.getElementById('game-container');

                gameContainer.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                    e.preventDefault();
                }, { passive: false });

                gameContainer.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                }, { passive: false });

                gameContainer.addEventListener('touchend', (e) => {
                    touchEndX = e.changedTouches[0].clientX;
                    touchEndY = e.changedTouches[0].clientY;
                    this.handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);
                });

                window.addEventListener('resize', () => {
                    this.calculateCellSize();
                    this.repositionTiles();
                });
            }

            handleKeyDown(e) {
                const keyMap = {
                    ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
                    w: 'up', W: 'up', s: 'down', S: 'down',
                    a: 'left', A: 'left', d: 'right', D: 'right'
                };

                const direction = keyMap[e.key];
                if (direction) {
                    e.preventDefault();
                    this.move(direction);
                }
            }

            handleSwipe(startX, startY, endX, endY) {
                const dx = endX - startX;
                const dy = endY - startY;
                const minSwipeDistance = 50;

                if (Math.abs(dx) < minSwipeDistance && Math.abs(dy) < minSwipeDistance) {
                    return;
                }

                let direction;
                if (Math.abs(dx) > Math.abs(dy)) {
                    direction = dx > 0 ? 'right' : 'left';
                } else {
                    direction = dy > 0 ? 'down' : 'up';
                }

                this.move(direction);
            }

            repositionTiles() {
                for (const [id, data] of this.tiles) {
                    this.setTilePosition(data.element, data.row, data.col);
                    this.updateTileFontSize(data.element, data.value);
                }
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            new Game2048();
        });
    </script>
</body>
</html>
