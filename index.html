<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="经典2048数字合并游戏 - 通过方向键或触摸滑动移动方块，相同数字合并得分，目标是将数字合成2048">
    <title>2048 - 经典数字合并游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
            background-color: #faf8ef;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #776e65;
            overflow-x: hidden;
            user-select: none;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .title {
            font-size: 80px;
            font-weight: bold;
            color: #776e65;
        }

        .scores-container {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background-color: #bbada0;
            padding: 10px 20px;
            border-radius: 6px;
            text-align: center;
            min-width: 100px;
            position: relative;
        }

        .score-label {
            font-size: 13px;
            font-weight: bold;
            color: #eee4da;
            text-transform: uppercase;
        }

        .score-value {
            font-size: 25px;
            font-weight: bold;
            color: #ffffff;
        }

        .score-addition {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            font-weight: bold;
            color: #776e65;
            opacity: 0;
            pointer-events: none;
        }

        .score-addition.animate {
            animation: scorePopup 0.6s ease-out;
        }

        @keyframes scorePopup {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -150%);
            }
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            background-color: #8f7a66;
            color: #f9f6f2;
            border: none;
            padding: 12px 24px;
            border-radius: 3px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            touch-action: manipulation;
        }

        .btn:hover {
            background-color: #9f8b77;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .subtitle {
            margin-bottom: 20px;
            font-size: 18px;
            color: #776e65;
            line-height: 1.5;
        }

        .game-container {
            background-color: #bbada0;
            border-radius: 6px;
            padding: 15px;
            position: relative;
            touch-action: none;
        }

        .grid-background {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .grid-cell {
            aspect-ratio: 1;
            background-color: #cdc1b4;
            border-radius: 6px;
        }

        .grid-container {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .tile {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border-radius: 6px;
            transition: top 0.12s ease-in-out, left 0.12s ease-in-out;
            z-index: 10;
        }

        .tile.new {
            animation: tileAppear 0.2s ease-out;
        }

        .tile.merged {
            animation: tileMerge 0.2s ease-out;
            z-index: 20;
        }

        @keyframes tileAppear {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes tileMerge {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
            }
            100% {
                transform: scale(1);
            }
        }

        .tile-2 { background-color: #eee4da; color: #776e65; }
        .tile-4 { background-color: #ede0c8; color: #776e65; }
        .tile-8 { background-color: #f2b179; color: #f9f6f2; }
        .tile-16 { background-color: #f59563; color: #f9f6f2; }
        .tile-32 { background-color: #f67c5f; color: #f9f6f2; }
        .tile-64 { background-color: #f65e3b; color: #f9f6f2; }
        .tile-128 { background-color: #edcf72; color: #f9f6f2; }
        .tile-256 { background-color: #edcc61; color: #f9f6f2; }
        .tile-512 { background-color: #edc850; color: #f9f6f2; }
        .tile-1024 { background-color: #edc53f; color: #f9f6f2; }
        .tile-2048 { background-color: #edc22e; color: #f9f6f2; }
        .tile-super { background-color: #3c3a32; color: #f9f6f2; }

        .game-message {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(238, 228, 218, 0.73);
            border-radius: 6px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: fadeIn 0.3s ease-out;
        }

        .game-message.active {
            display: flex;
        }

        .game-message.win {
            background-color: rgba(237, 194, 46, 0.5);
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        .game-message-title {
            font-size: 48px;
            font-weight: bold;
            color: #776e65;
            margin-bottom: 20px;
        }

        .game-message.win .game-message-title {
            color: #f9f6f2;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .game-message-subtitle {
            font-size: 18px;
            color: #776e65;
            margin-bottom: 30px;
        }

        .game-message-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-continue {
            background-color: #f2b179;
        }

        .btn-continue:hover {
            background-color: #f5c08a;
        }

        .instructions {
            margin-top: 20px;
            font-size: 14px;
            color: #776e65;
            text-align: center;
            line-height: 1.8;
        }

        .instructions strong {
            color: #776e65;
        }

        @media (max-width: 520px) {
            .title {
                font-size: 48px;
            }

            .score-box {
                padding: 8px 15px;
                min-width: 80px;
            }

            .score-value {
                font-size: 20px;
            }

            .game-container {
                padding: 10px;
            }

            .grid-background {
                gap: 10px;
            }

            .grid-container {
                top: 10px;
                left: 10px;
                right: 10px;
                bottom: 10px;
                gap: 10px;
            }

            .subtitle {
                font-size: 16px;
            }

            .game-message-title {
                font-size: 36px;
            }
        }

        @media (max-width: 380px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }

            .title {
                text-align: center;
                font-size: 40px;
            }

            .scores-container {
                justify-content: center;
            }

            .controls {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">2048</h1>
            <div class="scores-container">
                <div class="score-box">
                    <div class="score-label">分数</div>
                    <div class="score-value" id="score">0</div>
                    <div class="score-addition" id="score-addition"></div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高分</div>
                    <div class="score-value" id="best-score">0</div>
                </div>
            </div>
            <div class="controls">
                <button class="btn" id="new-game-btn">新游戏</button>
            </div>
        </div>

        <p class="subtitle">合并相同数字，挑战2048！使用方向键或滑动来移动方块。</p>

        <div class="game-container" id="game-container">
            <div class="grid-background">
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
                <div class="grid-cell"></div>
            </div>
            <div class="grid-container" id="grid-container"></div>
            <div class="game-message" id="game-message">
                <div class="game-message-title" id="message-title">游戏结束</div>
                <div class="game-message-subtitle" id="message-subtitle">最终得分: 0</div>
                <div class="game-message-buttons" id="message-buttons">
                    <button class="btn" id="retry-btn">再玩一次</button>
                </div>
            </div>
        </div>

        <div class="instructions">
            <strong>玩法说明：</strong><br>
            使用 <strong>方向键</strong> 或 <strong>WASD</strong> 键移动方块<br>
            在移动设备上，可以 <strong>滑动屏幕</strong> 来移动方块<br>
            相同数字的方块相撞时会合并成更大的数字<br>
            目标：合成 <strong>2048</strong>！
        </div>
    </div>

    <script>
        class Game2048 {
            constructor() {
                this.gridSize = 4;
                this.grid = [];
                this.score = 0;
                this.bestScore = 0;
                this.gameState = 'playing';
                this.hasWon = false;
                this.continueAfterWin = false;
                this.tileSeq = 0;
                this.tiles = new Map();
                this.isAnimating = false;

                this.gridContainer = document.getElementById('grid-container');
                this.scoreElement = document.getElementById('score');
                this.bestScoreElement = document.getElementById('best-score');
                this.scoreAdditionElement = document.getElementById('score-addition');
                this.gameMessageElement = document.getElementById('game-message');
                this.messageTitleElement = document.getElementById('message-title');
                this.messageSubtitleElement = document.getElementById('message-subtitle');
                this.messageButtonsElement = document.getElementById('message-buttons');

                this.cellSize = 0;
                this.gapSize = 0;

                this.loadBestScore();
                this.setupEventListeners();
                this.calculateCellSize();
                this.init();
            }

            calculateCellSize() {
                const containerWidth = this.gridContainer.offsetWidth;
                const isMobile = window.innerWidth <= 520;
                this.gapSize = isMobile ? 10 : 15;
                this.cellSize = (containerWidth - this.gapSize * 3) / 4;
            }

            loadBestScore() {
                const saved = localStorage.getItem('2048_bestScore');
                this.bestScore = saved ? parseInt(saved, 10) : 0;
                this.bestScoreElement.textContent = this.bestScore;
            }

            saveBestScore() {
                localStorage.setItem('2048_bestScore', this.bestScore.toString());
            }

            init() {
                this.grid = Array(this.gridSize).fill(null).map(() => Array(this.gridSize).fill(0));
                this.score = 0;
                this.gameState = 'playing';
                this.hasWon = false;
                this.continueAfterWin = false;
                this.tiles.clear();
                this.tileSeq = 0;
                this.gridContainer.innerHTML = '';
                this.updateScore(0);
                this.hideMessage();
                this.addRandomTile();
                this.addRandomTile();
            }

            addRandomTile() {
                const emptyCells = [];
                for (let r = 0; r < this.gridSize; r++) {
                    for (let c = 0; c < this.gridSize; c++) {
                        if (this.grid[r][c] === 0) {
                            emptyCells.push({ r, c });
                        }
                    }
                }
                if (emptyCells.length === 0) return null;

                const { r, c } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                const value = Math.random() < 0.9 ? 2 : 4;
                this.grid[r][c] = value;
                return this.createTile(r, c, value, true);
            }

            nextId() {
                return String(++this.tileSeq);
            }

            createTile(row, col, value, isNew) {
                const id = this.nextId();
                const tile = document.createElement('div');
                const tileClass = value <= 2048 ? `tile-${value}` : 'tile-super';
                tile.className = `tile ${tileClass}${isNew ? ' new' : ''}`;
                tile.textContent = value;
                tile.dataset.tileId = id;

                this.positionTile(tile, row, col);
                this.sizeTileFont(tile, value);

                const record = { element: tile, row, col, value };
                this.tiles.set(id, record);
                this.gridContainer.appendChild(tile);
                return { id, record };
            }

            positionTile(tile, row, col) {
                tile.style.width = `${this.cellSize}px`;
                tile.style.height = `${this.cellSize}px`;
                tile.style.top = `${row * (this.cellSize + this.gapSize)}px`;
                tile.style.left = `${col * (this.cellSize + this.gapSize)}px`;
            }

            sizeTileFont(tile, value) {
                let fontSize;
                if (value < 100) fontSize = this.cellSize * 0.5;
                else if (value < 1000) fontSize = this.cellSize * 0.4;
                else if (value < 10000) fontSize = this.cellSize * 0.3;
                else fontSize = this.cellSize * 0.25;
                tile.style.fontSize = `${fontSize}px`;
            }

            updateRecordPosition(id, row, col) {
                const rec = this.tiles.get(id);
                if (!rec) return;
                rec.row = row;
                rec.col = col;
                this.positionTile(rec.element, row, col);
            }

            removeTileById(id) {
                const rec = this.tiles.get(id);
                if (!rec) return;
                if (rec.element.parentNode) {
                    rec.element.parentNode.removeChild(rec.element);
                }
                this.tiles.delete(id);
            }

            findIdAt(row, col) {
                for (const [id, rec] of this.tiles) {
                    if (rec.row === row && rec.col === col) return id;
                }
                return null;
            }

            updateScore(addedScore) {
                this.score += addedScore;
                this.scoreElement.textContent = this.score;
                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    this.bestScoreElement.textContent = this.bestScore;
                    this.saveBestScore();
                }
                if (addedScore > 0) this.showScoreAddition(addedScore);
            }

            showScoreAddition(score) {
                this.scoreAdditionElement.textContent = `+${score}`;
                this.scoreAdditionElement.classList.remove('animate');
                void this.scoreAdditionElement.offsetWidth;
                this.scoreAdditionElement.classList.add('animate');
            }

            move(direction) {
                if (this.gameState === 'over' || this.gameState === 'won' || this.isAnimating) return false;

                const vector = this.getVector(direction);
                if (!vector) return false;

                const plan = this.buildMovePlan(direction, vector);
                if (!plan.moved) return false;

                this.isAnimating = true;
                this.executeMovePlan(plan);
                return true;
            }

            buildMovePlan(direction, vector) {
                let scoreGained = 0;
                const mergedPositions = new Set();
                const moves = [];
                const merges = [];
                let moved = false;

                const simGrid = this.grid.map(row => [...row]);
                const trav = this.buildTraversals(direction);
                const posToId = new Map();
                for (const [id, rec] of this.tiles) posToId.set(`${rec.row},${rec.col}`, id);

                for (const r of trav.r) {
                    for (const c of trav.c) {
                        const val = simGrid[r][c];
                        if (val === 0) continue;

                        const srcId = posToId.get(`${r},${c}`);
                        if (srcId === undefined) continue;

                        const { farthest, next } = this.findFarthestOnSim(simGrid, r, c, vector, mergedPositions);

                        if (next && simGrid[next.r][next.c] === val && !mergedPositions.has(`${next.r},${next.c}`)) {
                            const mergedVal = val * 2;
                            simGrid[next.r][next.c] = mergedVal;
                            simGrid[r][c] = 0;
                            mergedPositions.add(`${next.r},${next.c}`);
                            scoreGained += mergedVal;

                            const targetId = posToId.get(`${next.r},${next.c}`);
                            moves.push({ id: srcId, fromR: r, fromC: c, toR: next.r, toC: next.c });
                            merges.push({
                                posR: next.r,
                                posC: next.c,
                                value: mergedVal,
                                activeId: srcId,
                                targetId: targetId || null,
                                idsToRemove: [srcId]
                            });
                            if (targetId !== undefined) merges[merges.length - 1].idsToRemove.push(targetId);
                            moved = true;

                            if (mergedVal === 2048 && !this.hasWon) this.hasWon = true;
                        } else if (farthest.r !== r || farthest.c !== c) {
                            simGrid[farthest.r][farthest.c] = val;
                            simGrid[r][c] = 0;
                            moves.push({ id: srcId, fromR: r, fromC: c, toR: farthest.r, toC: farthest.c });
                            moved = true;
                        }
                    }
                }

                return { moved, scoreGained, moves, merges };
            }

            executeMovePlan(plan) {
                const { scoreGained, moves, merges } = plan;

                const idsToRemoveSet = new Set();
                for (const mg of merges) {
                    for (const id of mg.idsToRemove) idsToRemoveSet.add(id);
                }

                for (const m of moves) this.grid[m.fromR][m.fromC] = 0;

                const pureMoves = moves.filter(m => !idsToRemoveSet.has(m.id));

                for (const m of pureMoves) {
                    this.updateRecordPosition(m.id, m.toR, m.toC);
                }
                for (const m of pureMoves) {
                    this.grid[m.toR][m.toC] = this.tiles.get(m.id).value;
                }

                setTimeout(() => {
                    for (const id of idsToRemoveSet) {
                        this.removeTileById(id);
                    }

                    for (const mg of merges) {
                        this.grid[mg.posR][mg.posC] = mg.value;
                        const created = this.createTile(mg.posR, mg.posC, mg.value, false);
                        created.record.element.classList.add('merged');
                    }

                    this.syncTilesWithGrid();

                    this.updateScore(scoreGained);

                    setTimeout(() => {
                        this.addRandomTile();

                        if (this.hasWon && !this.continueAfterWin && this.gameState !== 'over') {
                            this.gameState = 'won';
                            this.showWinMessage();
                        } else if (this.checkGameOver()) {
                            this.gameState = 'over';
                            this.showGameOverMessage();
                        }
                        this.isAnimating = false;
                    }, 50);
                }, 120);
            }

            getVector(direction) {
                const map = { up:{r:-1,c:0}, down:{r:1,c:0}, left:{r:0,c:-1}, right:{r:0,c:1} };
                return map[direction];
            }

            buildTraversals(direction) {
                const t = { r:[], c:[] };
                for (let i = 0; i < this.gridSize; i++) { t.r.push(i); t.c.push(i); }
                if (direction === 'down') t.r.reverse();
                else if (direction === 'right') t.c.reverse();
                return t;
            }

            findFarthest(row, col, vec, mergedPos) {
                let prev, r = row, c = col;
                do {
                    prev = { r, c };
                    r += vec.r;
                    c += vec.c;
                } while (this.inBounds(r, c) && this.grid[r][c] === 0);

                const next = this.inBounds(r, c) && !mergedPos.has(`${r},${c}`) ? { r, c } : null;
                return { farthest: prev, next };
            }

            findFarthestOnSim(simGrid, row, col, vec, mergedPos) {
                let prev, r = row, c = col;
                do {
                    prev = { r, c };
                    r += vec.r;
                    c += vec.c;
                } while (this.inBounds(r, c) && simGrid[r][c] === 0);

                const next = this.inBounds(r, c) && !mergedPos.has(`${r},${c}`) ? { r, c } : null;
                return { farthest: prev, next };
            }

            inBounds(r, c) {
                return r >= 0 && r < this.gridSize && c >= 0 && c < this.gridSize;
            }

            checkGameOver() {
                for (let r = 0; r < this.gridSize; r++)
                    for (let c = 0; c < this.gridSize; c++)
                        if (this.grid[r][c] === 0) return false;

                for (let r = 0; r < this.gridSize; r++)
                    for (let c = 0; c < this.gridSize; c++) {
                        const v = this.grid[r][c];
                        if (r < this.gridSize - 1 && this.grid[r + 1][c] === v) return false;
                        if (c < this.gridSize - 1 && this.grid[r][c + 1] === v) return false;
                    }
                return true;
            }

            showWinMessage() {
                this.messageTitleElement.textContent = '你赢了！';
                this.messageSubtitleElement.textContent = `太棒了！最终得分: ${this.score}`;
                this.messageButtonsElement.innerHTML = `
                    <button class="btn btn-continue" id="continue-btn">继续游戏</button>
                    <button class="btn" id="retry-btn">重新开始</button>
                `;
                this.gameMessageElement.classList.add('active', 'win');
                document.getElementById('continue-btn').addEventListener('click', () => {
                    this.continueAfterWin = true;
                    this.gameState = 'playing';
                    this.hideMessage();
                });
                document.getElementById('retry-btn').addEventListener('click', () => this.init());
            }

            showGameOverMessage() {
                this.messageTitleElement.textContent = '游戏结束';
                this.messageSubtitleElement.textContent = `最终得分: ${this.score}`;
                this.messageButtonsElement.innerHTML = `<button class="btn" id="retry-btn">再玩一次</button>`;
                this.gameMessageElement.classList.add('active');
                this.gameMessageElement.classList.remove('win');
                document.getElementById('retry-btn').addEventListener('click', () => this.init());
            }

            hideMessage() {
                this.gameMessageElement.classList.remove('active', 'win');
            }

            setupEventListeners() {
                document.addEventListener('keydown', (e) => this.handleKeyDown(e));
                document.getElementById('new-game-btn').addEventListener('click', () => this.init());

                let touchStartX = 0, touchStartY = 0;
                const gc = document.getElementById('game-container');

                gc.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; e.preventDefault(); }, { passive: false });
                gc.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
                gc.addEventListener('touchend', (e) => {
                    this.handleSwipe(touchStartX, touchStartY, e.changedTouches[0].clientX, e.changedTouches[0].clientY);
                });

                window.addEventListener('resize', () => { this.calculateCellSize(); this.repositionAllTiles(); });
            }

            handleKeyDown(e) {
                const map = { ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right', w:'up',W:'up', s:'down',S:'down', a:'left',A:'left', d:'right',D:'right' };
                const dir = map[e.key];
                if (dir) { e.preventDefault(); this.move(dir); }
            }

            handleSwipe(sx, sy, ex, ey) {
                const dx = ex - sx, dy = ey - sy;
                if (Math.abs(dx) < 50 && Math.abs(dy) < 50) return;
                let dir;
                if (Math.abs(dx) > Math.abs(dy)) dir = dx > 0 ? 'right' : 'left';
                else dir = dy > 0 ? 'down' : 'up';
                this.move(dir);
            }

            repositionAllTiles() {
                for (const [, rec] of this.tiles) {
                    this.positionTile(rec.element, rec.row, rec.col);
                    this.sizeTileFont(rec.element, rec.value);
                }
            }

            syncTilesWithGrid() {
                const toRemove = [];
                for (const [id, rec] of this.tiles) {
                    const gridVal = this.grid[rec.row][rec.col];
                    if (rec.value !== gridVal || gridVal === 0) {
                        toRemove.push(id);
                    }
                }
                for (const id of toRemove) {
                    this.removeTileById(id);
                }
            }
        }

        window.addEventListener('DOMContentLoaded', () => { new Game2048(); });
    </script>
