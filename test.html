<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>2048 游戏逻辑测试套件</title>
    <style>
        body { font-family: 'Consolas', monospace; background: #1a1a2e; color: #eee; padding: 20px; }
        .pass { color: #4ecca3; }
        .fail { color: #f38181; }
        .info { color: #89c4f4; }
        h1 { color: #f38181; }
        h2 { color: #f38181; border-bottom: 1px solid #333; padding-bottom: 8px; }
        pre { background: #16213e; padding: 12px; border-radius: 6px; overflow-x: auto; }
        .summary { background: #0f3460; padding: 16px; border-radius: 8px; margin: 20px 0; font-size: 18px; }
        button { background: #e94560; color: white; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin: 5px; }
        button:hover { background: #c73e54; }
    </style>
</head>
<body>
    <h1>🧪 2048 游戏核心逻辑测试套件</h1>
    <div style="margin-bottom:20px">
        <button onclick="runAllTests()">▶ 运行全部测试</button>
        <button onclick="clearResults()">🗑 清除结果</button>
    </div>
    <div id="results"></div>

<script>
const SIZE = 4;

class TestGame2048 {
    constructor() {
        this.gridSize = SIZE;
        this.grid = [];
        this.score = 0;
        this.tileSeq = 0;
        this.tiles = new Map();
        this.isAnimating = false;
        this.gameState = 'playing';
        this.hasWon = false;
        this.continueAfterWin = false;
        this.spawnLog = [];
    }

    init() {
        this.grid = Array(this.gridSize).fill(null).map(() => Array(this.gridSize).fill(0));
        this.score = 0;
        this.tileSeq = 0;
        this.tiles.clear();
        this.spawnLog = [];
    }

    nextId() { return String(++this.tileSeq); }

    createTile(row, col, value) {
        const id = this.nextId();
        this.tiles.set(id, { row, col, value });
        return id;
    }

    removeTileById(id) { this.tiles.delete(id); }

    findIdAt(row, col) {
        for (const [id, rec] of this.tiles) {
            if (rec.row === row && rec.col === col) return id;
        }
        return null;
    }

    getVector(d) {
        const m = { up:{r:-1,c:0}, down:{r:1,c:0}, left:{r:0,c:-1}, right:{r:0,c:1} };
        return m[d];
    }

    buildTraversals(d) {
        const t = { r:[], c:[] };
        for (let i = 0; i < this.gridSize; i++) { t.r.push(i); t.c.push(i); }
        if (d === 'down') t.r.reverse();
        else if (d === 'right') t.c.reverse();
        return t;
    }

    findFarthest(row, col, vec, mergedPos) {
        let prev, r = row, c = col;
        do { prev = { r, c }; r += vec.r; c += vec.c; }
        while (this.inBounds(r, c) && this.grid[r][c] === 0);
        const next = this.inBounds(r, c) && !mergedPos.has(`${r},${c}`) ? { r, c } : null;
        return { farthest: prev, next };
    }

    findFarthestOnSim(simGrid, row, col, vec, mergedPos) {
        let prev, r = row, c = col;
        do { prev = { r, c }; r += vec.r; c += vec.c; }
        while (this.inBounds(r, c) && simGrid[r][c] === 0);
        const next = this.inBounds(r, c) && !mergedPos.has(`${r},${c}`) ? { r, c } : null;
        return { farthest: prev, next };
    }

    inBounds(r, c) { return r >= 0 && r < this.gridSize && c >= 0 && c < this.gridSize; }

    addRandomTile() {
        const empty = [];
        for (let r = 0; r < this.gridSize; r++)
            for (let c = 0; c < this.gridSize; c++)
                if (this.grid[r][c] === 0) empty.push({ r, c });
        if (empty.length === 0) return null;
        const { r, c } = empty[Math.floor(Math.random() * empty.length)];
        const val = Math.random() < 0.9 ? 2 : 4;
        this.grid[r][c] = val;
        const id = this.createTile(r, c, val);
        this.spawnLog.push({ pos: `${r},${c}`, val, id });
        return { r, c, val, id };
    }

    move(direction) {
        if (this.gameState === 'over' || this.gameState === 'won' || this.isAnimating) return false;
        const vector = this.getVector(direction);
        if (!vector) return false;

        const plan = this.buildMovePlan(direction, vector);
        if (!plan.moved) return { moved: false, scoreGained: 0, mergeCount: 0, tileCount: this.tiles.size };

        this.executePlan(plan);
        return { moved: true, scoreGained: plan.scoreGained, mergeCount: plan.merges.length, tileCount: this.tiles.size };
    }

    buildMovePlan(direction, vector) {
        let scoreGained = 0;
        const mergedPositions = new Set();
        const moves = [];
        const merges = [];
        let moved = false;

        const simGrid = this.grid.map(row => [...row]);
        const trav = this.buildTraversals(direction);
        const posToId = new Map();
        for (const [id, rec] of this.tiles) posToId.set(`${rec.row},${rec.col}`, id);

        for (const r of trav.r) {
            for (const c of trav.c) {
                const val = simGrid[r][c];
                if (val === 0) continue;
                const srcId = posToId.get(`${r},${c}`);
                if (srcId === undefined) continue;

                const { farthest, next } = this.findFarthestOnSim(simGrid, r, c, vector, mergedPositions);

                if (next && simGrid[next.r][next.c] === val && !mergedPositions.has(`${next.r},${next.c}`)) {
                    const mergedVal = val * 2;
                    simGrid[next.r][next.c] = mergedVal;
                    simGrid[r][c] = 0;
                    mergedPositions.add(`${next.r},${next.c}`);
                    scoreGained += mergedVal;

                    const targetId = posToId.get(`${next.r},${next.c}`);
                    moves.push({ id: srcId, fromR: r, fromC: c, toR: next.r, toC: next.c });
                    merges.push({ posR: next.r, posC: next.c, value: mergedVal,
                        activeId: srcId, targetId: targetId || null, idsToRemove: [srcId] });
                    if (targetId !== undefined) merges[merges.length - 1].idsToRemove.push(targetId);
                    moved = true;

                    if (mergedVal === 2048 && !this.hasWon) this.hasWon = true;
                } else if (farthest.r !== r || farthest.c !== c) {
                    simGrid[farthest.r][farthest.c] = val;
                    simGrid[r][c] = 0;
                    moves.push({ id: srcId, fromR: r, fromC: c, toR: farthest.r, toC: farthest.c });
                    moved = true;
                }
            }
        }
        return { moved, scoreGained, moves, merges };
    }

    executePlan(plan) {
        const { scoreGained, moves, merges } = plan;

        const idsToRemoveSet = new Set();
        for (const mg of merges)
            for (const id of mg.idsToRemove) idsToRemoveSet.add(id);

        for (const m of moves) this.grid[m.fromR][m.fromC] = 0;

        const pureMoves = moves.filter(m => !idsToRemoveSet.has(m.id));

        for (const m of pureMoves) {
            const rec = this.tiles.get(m.id);
            if (rec) { rec.row = m.toR; rec.col = m.toC; }
        }
        for (const m of pureMoves) {
            this.grid[m.toR][m.toC] = this.tiles.get(m.id).value;
        }

        for (const id of idsToRemoveSet) this.removeTileById(id);

        for (const mg of merges) {
            this.grid[mg.posR][mg.posC] = mg.value;
            this.createTile(mg.posR, mg.posC, mg.value);
        }
        this.syncTilesWithGrid();
        this.score += scoreGained;
    }

    checkGameOver() {
        for (let r = 0; r < this.gridSize; r++)
            for (let c = 0; c < this.gridSize; c++)
                if (this.grid[r][c] === 0) return false;
        for (let r = 0; r < this.gridSize; r++)
            for (let c = 0; c < this.gridSize; c++) {
                const v = this.grid[r][c];
                if (r < this.gridSize - 1 && this.grid[r + 1][c] === v) return false;
                if (c < this.gridSize - 1 && this.grid[r][c + 1] === v) return false;
            }
        return true;
    }

    getGridCopy() { return this.grid.map(row => [...row]); }
    getTilesSnapshot() {
        const snap = {};
        for (const [id, rec] of this.tiles) snap[id] = { ...rec };
        return snap;
    }

    syncTilesWithGrid() {
        const toRemove = [];
        for (const [id, rec] of this.tiles) {
            const gridVal = this.grid[rec.row][rec.col];
            if (rec.value !== gridVal || gridVal === 0) {
                toRemove.push(id);
            }
        }
        for (const id of toRemove) this.removeTileById(id);
    }
}

function assert(condition, message) {
    if (!condition) throw new Error(`❌ 断言失败: ${message}`);
}

function section(title) {
    const div = document.createElement('div');
    div.innerHTML = `<h2>${title}</h2>`;
    document.getElementById('results').appendChild(div);
    return div;
}

function log(html, cls = '') {
    const div = document.createElement('div');
    div.className = cls;
    div.innerHTML = html;
    document.getElementById('results').appendChild(div);
}

function runAllTests() {
    clearResults();
    let totalPassed = 0, totalFailed = 0;

    function test(name, fn) {
        try {
            fn();
            log(`✅ ${name}`, 'pass');
            totalPassed++;
        } catch (e) {
            log(`❌ ${name}: ${e.message}`, 'fail');
            totalFailed++;
        }
    }

    // ========== 测试A: 连续生成100次方块无重叠 ==========
    section('📋 测试 A: 连续生成100次方块无重叠');

    test('A1: 100次生成后grid中每个位置最多1个非零值', () => {
        const g = new TestGame2048();
        g.init();
        for (let i = 0; i < 100; i++) g.addRandomTile();

        for (let r = 0; r < SIZE; r++)
            for (let c = 0; c < SIZE; c++)
                assert(g.grid[r][c] === 0 || g.grid[r][c] === 2 || g.grid[r][c] === 4,
                    `grid[${r}][${c}] = ${g.grid[r][c]}, 应为0/2/4`);
    });

    test('A2: tiles Map大小等于grid中非零格子数', () => {
        const g = new TestGame2048();
        g.init();
        for (let i = 0; i < 50; i++) g.addRandomTile();

        let gridNonZero = 0;
        for (let r = 0; r < SIZE; r++)
            for (let c = 0; c < SIZE; c++)
                if (g.grid[r][c] !== 0) gridNonZero++;

        assert(g.tiles.size === gridNonZero,
            `tiles.size=${g.tiles.size} ≠ grid非零数=${gridNonZero}`);
    });

    test('A3: 每个tile的记录位置与grid值一致', () => {
        const g = new TestGame2048();
        g.init();
        for (let i = 0; i < 30; i++) g.addRandomTile();

        for (const [id, rec] of g.tiles) {
            assert(g.grid[rec.row][rec.col] === rec.value,
                `tile(id=${id}) at (${rec.row},${rec.col}) value=${rec.value} ≠ grid[${rec.row}][${rec.col}]=${g.grid[rec.row][rec.col]}`);
        }
    });

    test('A4: 所有tile ID唯一', () => {
        const g = new TestGame2048();
        g.init();
        for (let i = 0; i < 30; i++) g.addRandomTile();

        const ids = [...g.tiles.keys()];
        const uniqueIds = new Set(ids);
        assert(ids.length === uniqueIds.size,
            `发现重复ID! 总共${ids.length}个tile，唯一ID数=${uniqueIds.size}`);
    });

    test('A5: 生成概率分布合理(2约占85%-95%)', () => {
        let count2 = 0, count4 = 0, total = 10000;
        for (let i = 0; i < total; i++) {
            if (Math.random() < 0.9) count2++;
            else count4++;
        }
        const ratio2 = count2 / total;
        assert(ratio2 > 0.85 && ratio2 < 0.95,
            `2的出现率=${(ratio2*100).toFixed(1)}% (期望~90%), 样本: 2出现${count2}次, 4出现${count4}次`);
    });

    // ========== 测试B: 四方向合并正确性 ==========
    section('📋 测试 B: 四方向合并正确性');

    const directions = ['up', 'down', 'left', 'right'];

    for (const dir of directions) {
        const isVertical = (dir === 'up' || dir === 'down');

        test(`B-${dir}: 基础合并 [2,2,0,0] → [4,0,0,0]`, () => {
            const g = new TestGame2048();
            g.init();
            if (isVertical) {
                g.grid[0][0] = 2; g.grid[1][0] = 2;
                g.createTile(0, 0, 2); g.createTile(1, 0, 2);
            } else {
                g.grid[0][0] = 2; g.grid[0][1] = 2;
                g.createTile(0, 0, 2); g.createTile(0, 1, 2);
            }

            const result = g.move(dir);
            assert(result.moved === true, '应该返回moved=true');
            assert(result.mergeCount === 1, `应该有1次合并, 实际=${result.mergeCount}`);
            assert(result.scoreGained === 4, `得分应为4, 实际=${result.scoreGained}`);
        });

        test(`B-${dir}: 跨空位合并 [2,0,0,2] → [4,0,0,0]`, () => {
            const g = new TestGame2048();
            g.init();
            if (isVertical) {
                g.grid[0][0] = 2; g.grid[3][0] = 2;
                g.createTile(0, 0, 2); g.createTile(3, 0, 2);
            } else {
                g.grid[0][0] = 2; g.grid[0][3] = 2;
                g.createTile(0, 0, 2); g.createTile(0, 3, 2);
            }
            const result = g.move(dir);
            assert(result.mergeCount === 1, `应该有1次合并, 实际=${result.mergeCount}`);
            assert(result.scoreGained === 4, `得分应为4, 实际=${result.scoreGained}`);
        });

        test(`B-${dir}: 三连相同数字只合一次 [2,2,2,0]`, () => {
            const g = new TestGame2048();
            g.init();
            if (isVertical) {
                g.grid[0][0] = 2; g.grid[1][0] = 2; g.grid[2][0] = 2;
                g.createTile(0, 0, 2); g.createTile(1, 0, 2); g.createTile(2, 0, 2);
            } else {
                g.grid[0][0] = 2; g.grid[0][1] = 2; g.grid[0][2] = 2;
                g.createTile(0, 0, 2); g.createTile(0, 1, 2); g.createTile(0, 2, 2);
            }
            const result = g.move(dir);
            assert(result.mergeCount >= 1, `至少1次合并, 实际=${result.mergeCount}`);
            assert(result.mergeCount <= 2, `最多2次合并, 实际=${result.mergeCount}`);
            assert(result.scoreGained <= 8, `得分≤8, 实际=${result.scoreGained}`);
        });

        test(`B-${dir}: 不同数字不合并 [2,4,0,0]`, () => {
            const g = new TestGame2048();
            g.init();
            if (isVertical) {
                g.grid[0][0] = 2; g.grid[1][0] = 4;
                g.createTile(0, 0, 2); g.createTile(1, 0, 4);
            } else {
                g.grid[0][0] = 2; g.grid[0][1] = 4;
                g.createTile(0, 0, 2); g.createTile(0, 1, 4);
            }
            const result = g.move(dir);
            assert(result.mergeCount === 0, `不应有合并, 实际=${result.mergeCount}`);
            assert(result.scoreGained === 0, `得分应为0, 实际=${result.scoreGained}`);
        });

        test(`B-${dir}: 全满且可移动`, () => {
            const g = new TestGame2048();
            g.init();
            if (isVertical) {
                g.grid[0][0] = 2; g.grid[1][0] = 2; g.grid[2][0] = 4; g.grid[3][0] = 8;
                g.createTile(0, 0, 2); g.createTile(1, 0, 2);
                g.createTile(2, 0, 4); g.createTile(3, 0, 8);
            } else {
                g.grid[0] = [2, 2, 4, 8];
                g.createTile(0, 0, 2); g.createTile(0, 1, 2);
                g.createTile(0, 2, 4); g.createTile(0, 3, 8);
            }
            const result = g.move(dir);
            assert(result.moved === true, '应该能移动');
        });

        test(`B-${dir}: 无法移动时返回false`, () => {
            const g = new TestGame2048();
            g.init();
            g.grid = [
                [2, 4, 8, 16],
                [16, 8, 4, 2],
                [2, 4, 8, 16],
                [16, 8, 4, 2]
            ];
            for (let r = 0; r < SIZE; r++)
                for (let c = 0; c < SIZE; c++)
                    g.createTile(r, c, g.grid[r][c]);

            const result = g.move(dir);
            assert(result.moved === false, '无法移动应返回false');
        });
    }

    // ========== 测试C: 分数计算准确性 ==========
    section('📋 测试 C: 分数计算准确性');

    test('C1: 单次合并 2+2=4 得4分 (左)', () => {
        const g = new TestGame2048();
        g.init();
        g.grid[0] = [2, 2, 0, 0];
        g.createTile(0, 0, 2);
        g.createTile(0, 1, 2);
        g.move('left');
        assert(g.score === 4, `分数应为4, 实际=${g.score}`);
    });

    test('C1b: 单次合并 2+2=4 得4分 (上)', () => {
        const g = new TestGame2048();
        g.init();
        g.grid[0][0] = 2; g.grid[1][0] = 2;
        g.createTile(0, 0, 2); g.createTile(1, 0, 2);
        g.move('up');
        assert(g.score === 4, `分数应为4, 实际=${g.score}`);
    });

    test('C2: 多次合并累加得分', () => {
        const g = new TestGame2048();
        g.init();
        g.grid[0] = [2, 2, 4, 4];
        g.createTile(0, 0, 2);
        g.createTile(0, 1, 2);
        g.createTile(0, 2, 4);
        g.createTile(0, 3, 4);
        g.move('left');
        assert(g.score === 12, `2+2=4分 + 4+4=8分 = 12分, 实际=${g.score}`);
    });

    test('C3: 连续移动分数持续累加', () => {
        const g = new TestGame2048();
        g.init();

        g.grid[0][0] = 2; g.grid[0][1] = 2;
        g.createTile(0, 0, 2); g.createTile(0, 1, 2);
        g.move('left');
        assert(g.score === 4, `第1次移动后分数=4, 实际=${g.score}`);

        g.tiles.clear();
        g.tileSeq = 0;
        g.grid[0][0] = 4; g.grid[0][1] = 4; g.grid[0][2] = 0; g.grid[0][3] = 0;
        g.createTile(0, 0, 4); g.createTile(0, 1, 4);
        g.move('left');
        assert(g.score === 12, `第2次移动后分数=4+8=12, 实际=${g.score}`);
    });

    test('C4: 大数值合并 1024+1024=2048 得2048分', () => {
        const g = new TestGame2048();
        g.init();
        g.grid[0] = [1024, 1024, 0, 0];
        g.createTile(0, 0, 1024);
        g.createTile(0, 1, 1024);
        g.move('left');
        assert(g.score === 2048, `1024+1024应得2048分, 实际=${g.score}`);
        assert(g.hasWon === true, '合成2048后hasWon应为true');
    });

    test('C4b: 大数值合并(垂直) 1024+1024=2048 得2048分', () => {
        const g = new TestGame2048();
        g.init();
        g.grid[0][0] = 1024; g.grid[1][0] = 1024;
        g.createTile(0, 0, 1024); g.createTile(1, 0, 1024);
        g.move('up');
        assert(g.score === 2048, `1024+1024应得2048分, 实际=${g.score}`);
        assert(g.hasWon === true, '合成2048后hasWon应为true');
    });

    test('C5: 不合并的移动不得分', () => {
        const g = new TestGame2048();
        g.init();
        g.grid[0] = [2, 4, 8, 0];
        g.createTile(0, 0, 2);
        g.createTile(0, 1, 4);
        g.createTile(0, 2, 8);
        g.move('left');
        assert(g.score === 0, `纯移动不得分, 实际=${g.score}`);
    });

    test('C6: 无效操作不得分', () => {
        const g = new TestGame2048();
        g.init();
        g.grid[0] = [2, 4, 8, 16];
        g.createTile(0, 0, 2);
        g.createTile(0, 1, 4);
        g.createTile(0, 2, 8);
        g.createTile(0, 3, 16);
        g.move('left');
        assert(g.score === 0, `无效操作不得分, 实际=${g.score}`);
    });

    // ========== 测试D: 边界与压力测试 ==========
    section('📋 测试 D: 边界与压力测试');

    test('D1: 达到2048触发胜利状态', () => {
        const g = new TestGame2048();
        g.init();
        g.grid[0][0] = 1024;
        g.grid[0][1] = 1024;
        g.createTile(0, 0, 1024);
        g.createTile(0, 1, 1024);
        g.move('left');
        assert(g.hasWon === true, '合成2048后hasWon应为true');
        assert(g.gameState !== 'over', '胜利不是游戏结束');
    });

    test('D2: 满盘不可移动判定为结束', () => {
        const g = new TestGame2048();
        g.init();
        g.grid = [
            [2, 4, 8, 16],
            [16, 8, 4, 2],
            [2, 4, 8, 16],
            [16, 8, 4, 2]
        ];
        for (let r = 0; r < SIZE; r++)
            for (let c = 0; c < SIZE; c++)
                g.createTile(r, c, g.grid[r][c]);
        assert(g.checkGameOver() === true, '此棋盘应判定为游戏结束');
    });

    test('D3: 满盘但可合并不算结束', () => {
        const g = new TestGame2048();
        g.init();
        g.grid = [
            [2, 2, 4, 8],
            [16, 8, 4, 2],
            [2, 4, 8, 16],
            [16, 8, 4, 2]
        ];
        for (let r = 0; r < SIZE; r++)
            for (let c = 0; c < SIZE; c++)
                g.createTile(r, c, g.grid[r][c]);
        assert(g.checkGameOver() === false, '(0,0)和(0,1)都是2可合并，不应结束');
    });

    test('D4: 快速连续200次随机操作不崩溃', () => {
        const g = new TestGame2048();
        g.init();
        const dirs = ['up', 'down', 'left', 'right'];
        let crashCount = 0;
        for (let i = 0; i < 200; i++) {
            try {
                const dir = dirs[Math.floor(Math.random() * 4)];
                const result = g.move(dir);
                if (result.moved) {
                    g.addRandomTile();
                    if (g.checkGameOver()) break;
                }
            } catch (e) {
                crashCount++;
            }
        }
        assert(crashCount === 0, `200次操作中有${crashCount}次崩溃`);
    });

    test('D5: 模拟真实游戏模式(200轮: 1次移动+1次生成)', () => {
        const g = new TestGame2048();
        g.init();
        const dirs = ['up', 'down', 'left', 'right'];
        for (let round = 0; round < 200; round++) {
            const d = dirs[round % 4];

            const preGridNonZero = g.grid.flat().filter(v => v !== 0).length;
            if (g.tiles.size !== preGridNonZero) {
                throw new Error(`[Round${round}前] tiles.size=${g.tiles.size} ≠ grid非零=${preGridNonZero} (上轮addRandomTile后遗留)`);
            }

            const beforeTiles = new Map(g.tiles);
            const beforeGrid = g.grid.map(row => [...row]);
            const result = g.move(d);

            const gridNonZero = g.grid.flat().filter(v => v !== 0).length;

            if (g.tiles.size !== gridNonZero) {
                let detail = `Round${round} dir=${d}: tiles.size=${g.tiles.size} ≠ grid非零=${gridNonZero}\n`;
                detail += `=== 移动前 ===\n`;
                for (let r = 0; r < SIZE; r++) detail += `  ${beforeGrid[r].join(',')}\n`;
                detail += `移动前tiles:\n`;
                for (const [id, rec] of beforeTiles)
                    detail += `  id=${id} pos=(${rec.row},${rec.col}) val=${rec.value}\n`;
                detail += `moved=${result.moved} scoreGained=${result.scoreGained} mergeCount=${result.mergeCount} tileCount=${result.tileCount}\n`;
                detail += `=== 移动后 ===\n`;
                for (let r = 0; r < SIZE; r++) detail += `  ${g.grid[r].join(',')}\n`;
                detail += `移动后tiles:\n`;
                for (const [id, rec] of g.tiles) {
                    const gridVal = g.grid[rec.row][rec.col];
                    detail += `  id=${id} pos=(${rec.row},${rec.col}) val=${rec.value} gridAtPos=${gridVal}\n`;
                }
                throw new Error(detail);
            }

            if (!g.checkGameOver()) g.addRandomTile();
            else break;
        }
    });

    // ========== 结果汇总 ==========
    const summaryDiv = document.createElement('div');
    summaryDiv.className = 'summary';
    summaryDiv.innerHTML = `
        <strong>📊 测试结果汇总</strong><br>
        ✅ 通过: <span class="pass">${totalPassed}</span> &nbsp;&nbsp;
        ❌ 失败: <span class="fail">${totalFailed}</span> &nbsp;&nbsp;
        总计: ${totalPassed + totalFailed}
        ${totalFailed === 0 ? '<br><span class="pass" style="font-size:22px">🎉 全部测试通过！游戏逻辑完全正确。</span>' : '<br><span class="fail">⚠️ 存在失败项，请检查上方详情。</span>'}
    `;
    document.getElementById('results').appendChild(summaryDiv);
}

function clearResults() {
    document.getElementById('results').innerHTML = '';
}
